<!-- ============================================================ -->
<!-- MODULE: QUẢN LÝ TÌNH NGUYỆN VIÊN -->
<!-- ============================================================ -->

<div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-5">
    <div class="stat-box">
        <div class="value text-purple-600" id="vol-total">0</div>
        <div class="label">Tổng TNV</div>
    </div>
    <div class="stat-box">
        <div class="value text-emerald-600" id="vol-active">0</div>
        <div class="label">Đang hoạt động</div>
    </div>
    <div class="stat-box">
        <div class="value text-amber-600" id="vol-inactive">0</div>
        <div class="label">Tạm nghỉ</div>
    </div>
    <div class="stat-box">
        <div class="value text-blue-600" id="vol-missions">0</div>
        <div class="label">Nhiệm vụ đang làm</div>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header">
        <h4><i class="fa-solid fa-filter text-slate-500 mr-1"></i> Bộ lọc</h4>
    </div>
    <div class="flex flex-wrap gap-3 items-center">
        <div>
            <label class="text-xs font-semibold text-slate-500">Khu vực</label>
            <select id="vol-filter-area" class="px-3 py-1.5 border rounded-lg text-sm">
                <option value="">Tất cả</option>
                <option value="Đà Nẵng">Đà Nẵng</option>
                <option value="Thừa Thiên Huế">Thừa Thiên Huế</option>
                <option value="Quảng Nam">Quảng Nam</option>
            </select>
        </div>
        <div>
            <label class="text-xs font-semibold text-slate-500">Trạng thái</label>
            <select id="vol-filter-status" class="px-3 py-1.5 border rounded-lg text-sm">
                <option value="">Tất cả</option>
                <option value="active">🟢 Đang hoạt động</option>
                <option value="inactive">⏸️ Tạm nghỉ</option>
            </select>
        </div>
        <button onclick="applyVolunteerFilters()" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
            <i class="fa-solid fa-magnifying-glass"></i> Lọc
        </button>
        <button onclick="resetVolunteerFilters()" class="bg-slate-200 text-slate-700 px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-slate-300 transition">
            <i class="fa-solid fa-undo"></i> Đặt lại
        </button>
        <button onclick="showAddVolunteerModal()" class="bg-purple-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-purple-700 transition">
            <i class="fa-solid fa-plus"></i> Thêm TNV
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h4><i class="fa-regular fa-handshake text-purple-500 mr-1"></i> Danh sách tình nguyện viên</h4>
        <span class="text-xs text-slate-400" id="vol-count">0 TNV</span>
    </div>
    <div class="table-container">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-slate-50 border-b-2 border-slate-200">
                    <th class="px-3 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Mã</th>
                    <th class="px-3 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Họ tên</th>
                    <th class="px-3 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Khu vực</th>
                    <th class="px-3 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Kỹ năng</th>
                    <th class="px-3 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Trạng thái</th>
                    <th class="px-3 py-2.5 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider">Thao tác</th>
                </tr>
            </thead>
            <tbody id="volunteers-table-body"></tbody>
        </table>
    </div>
</div>

<!-- Modal thêm TNV -->
<div id="addVolunteerModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h3 class="text-lg font-bold mb-4"><i class="fa-regular fa-user-plus text-purple-500 mr-2"></i> Thêm tình nguyện viên</h3>
        <div class="space-y-3">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Họ tên</label>
                <input type="text" id="newVolName" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" placeholder="Nhập họ tên..." />
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Khu vực</label>
                <input type="text" id="newVolArea" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" placeholder="Nhập khu vực..." />
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Kỹ năng</label>
                <select id="newVolSkills" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
                    <option value="Vận chuyển">🚚 Vận chuyển</option>
                    <option value="Lắp đặt">🔧 Lắp đặt</option>
                    <option value="Y tế">🏥 Y tế</option>
                    <option value="Cứu hộ">🚨 Cứu hộ</option>
                    <option value="Phân phát">📦 Phân phát</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Trạng thái</label>
                <select id="newVolStatus" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
                    <option value="active">🟢 Đang hoạt động</option>
                    <option value="inactive">⏸️ Tạm nghỉ</option>
                </select>
            </div>
        </div>
        <div class="flex gap-2 mt-4">
            <button onclick="addVolunteer()" class="flex-1 bg-purple-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-purple-700 transition">Thêm</button>
            <button onclick="closeAddVolunteerModal()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-semibold hover:bg-gray-300 transition">Hủy</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// VOLUNTEERS DATA
// ============================================================
let allVolunteers = [], filteredVolunteers = [];

function init_admin_volunteers() {
    console.log('🧑‍🤝‍🧑 Khởi tạo module Tình nguyện viên...');
    loadVolunteers();
    window.addEventListener('dataChanged', function(e) {
        if (e.detail.key === AppData.KEYS.VOLUNTEERS) loadVolunteers();
    });
}

function loadVolunteers() {
    allVolunteers = AppData.getVolunteers();
    console.log(`🧑‍🤝‍🧑 Đã tải ${allVolunteers.length} tình nguyện viên`);
    applyVolunteerFilters();
}

function applyVolunteerFilters() {
    const area = document.getElementById('vol-filter-area').value;
    const status = document.getElementById('vol-filter-status').value;
    
    filteredVolunteers = allVolunteers.filter(v => {
        let match = true;
        if (area && !v.area.includes(area)) match = false;
        if (status && v.status !== status) match = false;
        return match;
    });
    
    renderVolunteers();
    updateVolunteerStats();
}

function resetVolunteerFilters() {
    document.getElementById('vol-filter-area').value = '';
    document.getElementById('vol-filter-status').value = '';
    applyVolunteerFilters();
}

function updateVolunteerStats() {
    const total = allVolunteers.length;
    const active = allVolunteers.filter(v => v.status === 'active').length;
    const inactive = allVolunteers.filter(v => v.status === 'inactive').length;
    const missions = AppData.getMissions().filter(m => m.status === 'active' || m.status === 'pending').length;
    
    document.getElementById('vol-total').textContent = total;
    document.getElementById('vol-active').textContent = active;
    document.getElementById('vol-inactive').textContent = inactive;
    document.getElementById('vol-missions').textContent = missions;
    document.getElementById('vol-count').textContent = `${filteredVolunteers.length} TNV`;
}

function renderVolunteers() {
    const container = document.getElementById('volunteers-table-body');
    if (!container) return;
    container.innerHTML = '';
    
    if (filteredVolunteers.length === 0) {
        container.innerHTML = `
            <tr>
                <td colspan="6" class="text-center py-8 text-slate-400 text-sm">Không có tình nguyện viên nào</td>
            </tr>
        `;
        return;
    }
    
    filteredVolunteers.forEach(v => {
        const statusColor = v.status === 'active' ? 'badge-success' : 'badge-warning';
        const statusLabel = v.status === 'active' ? '🟢 Đang hoạt động' : '⏸️ Tạm nghỉ';
        const skills = Array.isArray(v.skills) ? v.skills.join(', ') : v.skills || 'N/A';
        
        const tr = document.createElement('tr');
        tr.className = 'border-b border-slate-100 hover:bg-slate-50 transition-colors';
        tr.innerHTML = `
            <td class="px-3 py-2.5 text-xs font-bold text-purple-600 whitespace-nowrap" style="font-family: 'Courier New', monospace; font-weight: 700;">${v.code || 'N/A'}</td>
            <td class="px-3 py-2.5 text-sm text-slate-800 font-medium">${v.name}</td>
            <td class="px-3 py-2.5 text-xs text-slate-500">${v.area || 'N/A'}</td>
            <td class="px-3 py-2.5 text-xs text-slate-500">${skills}</td>
            <td class="px-3 py-2.5"><span class="badge-status ${statusColor} text-xs">${statusLabel}</span></td>
            <td class="px-3 py-2.5 text-center whitespace-nowrap">
                <button onclick="toggleVolunteerStatus('${v.id}')" class="text-blue-500 hover:text-blue-700 mr-1.5 transition-colors" title="Đổi trạng thái">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button onclick="deleteVolunteer('${v.id}')" class="text-red-500 hover:text-red-700 transition-colors" title="Xóa">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        `;
        container.appendChild(tr);
    });
}

function showAddVolunteerModal() {
    document.getElementById('addVolunteerModal').classList.remove('hidden');
    document.getElementById('newVolName').value = '';
    document.getElementById('newVolArea').value = '';
}

function closeAddVolunteerModal() {
    document.getElementById('addVolunteerModal').classList.add('hidden');
}

function addVolunteer() {
    const name = document.getElementById('newVolName').value.trim();
    const area = document.getElementById('newVolArea').value.trim();
    const skills = document.getElementById('newVolSkills').value;
    const status = document.getElementById('newVolStatus').value;
    
    if (!name || !area) {
        showNotification('Vui lòng nhập họ tên và khu vực!', 'error');
        return;
    }
    
    AppData.addVolunteer({ name, area, skills: [skills], status });
    allVolunteers = AppData.getVolunteers();
    applyVolunteerFilters();
    closeAddVolunteerModal();
    showNotification('✅ Đã thêm tình nguyện viên thành công!', 'success');
}

function toggleVolunteerStatus(id) {
    const volunteer = allVolunteers.find(v => v.id === id);
    if (!volunteer) return;
    volunteer.status = volunteer.status === 'active' ? 'inactive' : 'active';
    AppData.setVolunteers(allVolunteers);
    applyVolunteerFilters();
    showNotification(`🔄 Đã cập nhật trạng thái: ${volunteer.status}`, 'info');
}

function deleteVolunteer(id) {
    if (!confirm('Bạn có chắc muốn xóa tình nguyện viên này?')) return;
    allVolunteers = allVolunteers.filter(v => v.id !== id);
    AppData.setVolunteers(allVolunteers);
    applyVolunteerFilters();
    showNotification('🗑️ Đã xóa tình nguyện viên', 'warning');
}

// ============================================================
// AUTO INIT
// ============================================================
if (document.readyState === 'complete') {
    setTimeout(init_admin_volunteers, 300);
} else {
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(init_admin_volunteers, 300);
    });
}

// ============================================================
// EXPOSE
// ============================================================
window.init_admin_volunteers = init_admin_volunteers;
window.applyVolunteerFilters = applyVolunteerFilters;
window.resetVolunteerFilters = resetVolunteerFilters;
window.showAddVolunteerModal = showAddVolunteerModal;
window.closeAddVolunteerModal = closeAddVolunteerModal;
window.addVolunteer = addVolunteer;
window.toggleVolunteerStatus = toggleVolunteerStatus;
window.deleteVolunteer = deleteVolunteer;
</script>
