<!-- MODULE: CẤU HÌNH HỆ THỐNG -->
<!-- ============================================================ -->

<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div class="card">
        <div class="card-header">
            <h4><i class="fa-solid fa-user-gear text-blue-500 mr-1"></i> Cài đặt tài khoản</h4>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Tên hiển thị</label>
                <input type="text" id="settings-name" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" value="Admin" />
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Email</label>
                <input type="email" id="settings-email" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" value="admin@hlms.gov.vn" />
            </div>
            <button onclick="saveSettings()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
                <i class="fa-solid fa-floppy-disk"></i> Cập nhật
            </button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">
            <h4><i class="fa-solid fa-shield-halved text-blue-500 mr-1"></i> Bảo mật</h4>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Mật khẩu hiện tại</label>
                <input type="password" id="settings-current-pass" placeholder="••••••••" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" />
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Mật khẩu mới</label>
                <input type="password" id="settings-new-pass" placeholder="••••••••" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" />
            </div>
            <button onclick="changePassword()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition">
                <i class="fa-solid fa-key"></i> Đổi mật khẩu
            </button>
        </div>
    </div>
</div>

<div class="card mt-4">
    <div class="card-header">
        <h4><i class="fa-solid fa-database text-slate-500 mr-1"></i> Dữ liệu</h4>
    </div>
    <div class="flex flex-wrap gap-3">
        <button onclick="exportAllData()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition">
            <i class="fa-solid fa-download"></i> Xuất dữ liệu
        </button>
        <button onclick="importAllData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
            <i class="fa-solid fa-upload"></i> Nhập dữ liệu
        </button>
        <button onclick="resetAllData()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition">
            <i class="fa-solid fa-trash"></i> Đặt lại
        </button>
    </div>
    <div class="mt-3 text-xs text-slate-400">
        <i class="fa-regular fa-circle-info"></i> Dữ liệu bao gồm: yêu cầu, báo cáo, tồn kho, nhà cung cấp, tình nguyện viên
    </div>
</div>

<script>
function init_admin_settings() {
    console.log('⚙️ Khởi tạo module Cấu hình...');
    const settings = AppData.getSettings();
    if (settings) {
        document.getElementById('settings-name').value = settings.displayName || 'Admin';
        document.getElementById('settings-email').value = settings.email || 'admin@hlms.gov.vn';
    }
}

function saveSettings() {
    const name = document.getElementById('settings-name').value.trim();
    const email = document.getElementById('settings-email').value.trim();
    if (!name || !email) {
        showNotification('Vui lòng nhập đầy đủ thông tin!', 'error');
        return;
    }
    AppData.setSettings({ displayName: name, email });
    showNotification('✅ Đã cập nhật cài đặt!', 'success');
}

function changePassword() {
    const current = document.getElementById('settings-current-pass').value;
    const newPass = document.getElementById('settings-new-pass').value;
    if (!current || !newPass) {
        showNotification('Vui lòng nhập đầy đủ mật khẩu!', 'error');
        return;
    }
    if (newPass.length < 6) {
        showNotification('Mật khẩu mới phải có ít nhất 6 ký tự!', 'error');
        return;
    }
    localStorage.setItem('hlms_admin_password', newPass);
    document.getElementById('settings-current-pass').value = '';
    document.getElementById('settings-new-pass').value = '';
    showNotification('✅ Đã đổi mật khẩu thành công!', 'success');
}

function exportAllData() {
    const data = AppData.exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hlms_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showNotification('📥 Đã xuất dữ liệu!', 'success');
}

function importAllData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                if (!confirm('⚠️ Dữ liệu hiện tại sẽ bị ghi đè! Tiếp tục?')) return;
                AppData.importAll(data);
                showNotification('📥 Đã nhập dữ liệu! Trang sẽ tải lại...', 'success');
                setTimeout(() => location.reload(), 1500);
            } catch (error) {
                showNotification('❌ Lỗi khi nhập dữ liệu!', 'error');
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

function resetAllData() {
    if (!confirm('⚠️ Bạn có chắc muốn đặt lại toàn bộ dữ liệu? Không thể hoàn tác!')) return;
    if (!confirm('Xác nhận lần cuối?')) return;
    AppData.resetAll();
    showNotification('🔄 Đã đặt lại dữ liệu! Trang sẽ tải lại...', 'warning');
    setTimeout(() => location.reload(), 1500);
}

if (document.readyState === 'complete') {
    setTimeout(init_admin_settings, 200);
} else {
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(init_admin_settings, 200);
    });
}

window.init_admin_settings = init_admin_settings;
window.saveSettings = saveSettings;
window.changePassword = changePassword;
window.exportAllData = exportAllData;
window.importAllData = importAllData;
window.resetAllData = resetAllData;
</script>
