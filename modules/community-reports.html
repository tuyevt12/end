<!-- MODULE: BÁO CÁO CỘNG ĐỒNG -->
<!-- ============================================================ -->

<div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-5">
    <div class="stat-box">
        <div class="value text-red-600" id="cr-total">0</div>
        <div class="label">Tổng báo cáo</div>
    </div>
    <div class="stat-box">
        <div class="value text-amber-600" id="cr-pending">0</div>
        <div class="label">Chờ xử lý</div>
    </div>
    <div class="stat-box">
        <div class="value text-blue-600" id="cr-processing">0</div>
        <div class="label">Đang xử lý</div>
    </div>
    <div class="stat-box">
        <div class="value text-emerald-600" id="cr-resolved">0</div>
        <div class="label">Đã giải quyết</div>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header">
        <h4><i class="fa-solid fa-filter text-slate-500 mr-1"></i> Bộ lọc</h4>
    </div>
    <div class="flex flex-wrap gap-3 items-center">
        <div>
            <label class="text-xs font-semibold text-slate-500">Khu vực</label>
            <select id="cr-filter-area" class="px-3 py-1.5 border rounded-lg text-sm">
                <option value="">Tất cả</option>
                <option value="Quảng Nam">Quảng Nam</option>
                <option value="Quảng Bình">Quảng Bình</option>
                <option value="Thừa Thiên Huế">Thừa Thiên Huế</option>
                <option value="Đà Nẵng">Đà Nẵng</option>
            </select>
        </div>
        <div>
            <label class="text-xs font-semibold text-slate-500">Loại</label>
            <select id="cr-filter-type" class="px-3 py-1.5 border rounded-lg text-sm">
                <option value="">Tất cả</option>
                <option value="flood">🌊 Ngập lụt</option>
                <option value="landslide">🏔️ Sạt lở</option>
                <option value="storm">🌀 Bão</option>
                <option value="other">📌 Khác</option>
            </select>
        </div>
        <div>
            <label class="text-xs font-semibold text-slate-500">Trạng thái</label>
            <select id="cr-filter-status" class="px-3 py-1.5 border rounded-lg text-sm">
                <option value="">Tất cả</option>
                <option value="pending">⏳ Chờ xử lý</option>
                <option value="processing">🔄 Đang xử lý</option>
                <option value="resolved">✅ Đã giải quyết</option>
            </select>
        </div>
        <button onclick="applyCommunityFilters()" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
            <i class="fa-solid fa-magnifying-glass"></i> Lọc
        </button>
        <button onclick="resetCommunityFilters()" class="bg-slate-200 text-slate-700 px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-slate-300 transition">
            <i class="fa-solid fa-undo"></i> Đặt lại
        </button>
        <button onclick="showAddReportModal()" class="bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-red-700 transition">
            <i class="fa-solid fa-plus"></i> Thêm báo cáo
        </button>
        <button onclick="exportCommunityReportsCSV()" class="bg-emerald-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition">
            <i class="fa-solid fa-file-csv"></i> Xuất CSV
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h4><i class="fa-regular fa-flag text-red-500 mr-1"></i> Danh sách báo cáo</h4>
        <span class="text-xs text-slate-400" id="cr-count">0 báo cáo</span>
    </div>
    <div id="community-reports-list" class="space-y-3"></div>
</div>

<!-- Modal thêm báo cáo -->
<div id="addReportModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h3 class="text-lg font-bold mb-4"><i class="fa-regular fa-flag text-red-500 mr-2"></i> Thêm báo cáo</h3>
        <div class="space-y-3">
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Tiêu đề</label>
                <input type="text" id="newCrTitle" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" placeholder="Nhập tiêu đề..." />
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Địa điểm</label>
                <input type="text" id="newCrLocation" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" placeholder="Nhập địa điểm..." />
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Loại</label>
                <select id="newCrType" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
                    <option value="flood">🌊 Ngập lụt</option>
                    <option value="landslide">🏔️ Sạt lở</option>
                    <option value="storm">🌀 Bão</option>
                    <option value="other">📌 Khác</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Mức độ</label>
                <select id="newCrSeverity" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
                    <option value="critical">🔴 Nghiêm trọng</option>
                    <option value="high">🟠 Cao</option>
                    <option value="medium">🟡 Trung bình</option>
                    <option value="low">🟢 Thấp</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Mô tả</label>
                <textarea id="newCrDesc" rows="3" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" placeholder="Mô tả chi tiết..."></textarea>
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase">Người báo cáo</label>
                <input type="text" id="newCrReporter" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" placeholder="Tên người báo cáo..." />
            </div>
        </div>
        <div class="flex gap-2 mt-4">
            <button onclick="addCommunityReport()" class="flex-1 bg-red-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition">Thêm</button>
            <button onclick="closeAddReportModal()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-semibold hover:bg-gray-300 transition">Hủy</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// COMMUNITY REPORTS
// ============================================================
let allReports = [], filteredReports = [];

function init_admin_community_reports() {
    console.log('📌 Khởi tạo module Báo cáo cộng đồng...');
    loadReports();
    window.addEventListener('dataChanged', function(e) {
        if (e.detail.key === AppData.KEYS.REPORTS) loadReports();
    });
}

function loadReports() {
    allReports = AppData.getReports();
    console.log(`📌 Đã tải ${allReports.length} báo cáo`);
    applyCommunityFilters();
}

function applyCommunityFilters() {
    const area = document.getElementById('cr-filter-area').value;
    const type = document.getElementById('cr-filter-type').value;
    const status = document.getElementById('cr-filter-status').value;
    
    filteredReports = allReports.filter(r => {
        let match = true;
        if (area && !r.location.includes(area)) match = false;
        if (type && r.type !== type) match = false;
        if (status && r.status !== status) match = false;
        return match;
    });
    
    renderReports();
    updateReportStats();
}

function resetCommunityFilters() {
    document.getElementById('cr-filter-area').value = '';
    document.getElementById('cr-filter-type').value = '';
    document.getElementById('cr-filter-status').value = '';
    applyCommunityFilters();
}

function updateReportStats() {
    const total = allReports.length;
    const pending = allReports.filter(r => r.status === 'pending').length;
    const processing = allReports.filter(r => r.status === 'processing').length;
    const resolved = allReports.filter(r => r.status === 'resolved').length;
    
    document.getElementById('cr-total').textContent = total;
    document.getElementById('cr-pending').textContent = pending;
    document.getElementById('cr-processing').textContent = processing;
    document.getElementById('cr-resolved').textContent = resolved;
    document.getElementById('cr-count').textContent = `${filteredReports.length} báo cáo`;
}

function renderReports() {
    const container = document.getElementById('community-reports-list');
    if (!container) return;
    container.innerHTML = '';
    
    if (filteredReports.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">Chưa có báo cáo nào</div>';
        return;
    }
    
    const severityMap = {
        'critical': { label: '🔴 Nghiêm trọng', cls: 'badge-danger' },
        'high': { label: '🟠 Cao', cls: 'badge-warning' },
        'medium': { label: '🟡 Trung bình', cls: 'badge-info' },
        'low': { label: '🟢 Thấp', cls: 'badge-success' }
    };
    const statusMap = {
        'pending': { label: '⏳ Chờ xử lý', cls: 'badge-pending' },
        'processing': { label: '🔄 Đang xử lý', cls: 'badge-info' },
        'resolved': { label: '✅ Đã giải quyết', cls: 'badge-success' }
    };
    const typeMap = {
        'flood': '🌊 Ngập lụt',
        'landslide': '🏔️ Sạt lở',
        'storm': '🌀 Bão',
        'other': '📌 Khác'
    };
    
    filteredReports.forEach(r => {
        const sev = severityMap[r.severity] || severityMap['low'];
        const stat = statusMap[r.status] || statusMap['pending'];
        const type = typeMap[r.type] || '📌 Báo cáo';
        
        const div = document.createElement('div');
        div.className = `p-3 border rounded-lg flex justify-between items-start hover:shadow-md transition-all ${r.severity === 'critical' ? 'border-red-300 bg-red-50/50' : ''}`;
        div.innerHTML = `
            <div class="flex-1">
                <div class="flex items-center gap-2 flex-wrap">
                    <p class="font-semibold text-sm text-slate-800">${r.title}</p>
                    <span class="text-xs text-slate-400">${type}</span>
                </div>
                <p class="text-xs text-slate-500">📍 ${r.location}</p>
                <p class="text-xs text-slate-500 mt-0.5">${r.desc || ''}</p>
                <div class="flex items-center gap-3 mt-1">
                    <span class="text-[10px] text-slate-400">👤 ${r.reporter || 'N/A'}</span>
                    <span class="text-[10px] text-slate-400">🕐 ${r.createdAt ? new Date(r.createdAt).toLocaleString('vi-VN') : 'Vừa tạo'}</span>
                </div>
            </div>
            <div class="text-right ml-4">
                <span class="badge-status ${sev.cls}">${sev.label}</span>
                <div class="mt-1">
                    <span class="badge-status ${stat.cls}">${stat.label}</span>
                </div>
                <div class="mt-1">
                    <button onclick="toggleReportStatus('${r.id}')" class="text-blue-500 hover:text-blue-700 text-xs mr-2" title="Đổi trạng thái">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                    <button onclick="deleteReport('${r.id}')" class="text-red-500 hover:text-red-700 text-xs" title="Xóa">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

function showAddReportModal() {
    document.getElementById('addReportModal').classList.remove('hidden');
    document.getElementById('newCrTitle').value = '';
    document.getElementById('newCrLocation').value = '';
    document.getElementById('newCrDesc').value = '';
    document.getElementById('newCrReporter').value = '';
}

function closeAddReportModal() {
    document.getElementById('addReportModal').classList.add('hidden');
}

function addCommunityReport() {
    const title = document.getElementById('newCrTitle').value.trim();
    const location = document.getElementById('newCrLocation').value.trim();
    const type = document.getElementById('newCrType').value;
    const severity = document.getElementById('newCrSeverity').value;
    const desc = document.getElementById('newCrDesc').value.trim();
    const reporter = document.getElementById('newCrReporter').value.trim();
    
    if (!title || !location) {
        showNotification('Vui lòng nhập tiêu đề và địa điểm!', 'error');
        return;
    }
    
    const typeMap = { 'flood': '🌊 Ngập lụt', 'landslide': '🏔️ Sạt lở', 'storm': '🌀 Bão', 'other': '📌 Khác' };
    
    AppData.addReport({
        title, location, type, typeLabel: typeMap[type] || type,
        severity, status: 'pending', desc, reporter: reporter || 'Ẩn danh'
    });
    
    allReports = AppData.getReports();
    applyCommunityFilters();
    closeAddReportModal();
    showNotification('✅ Đã thêm báo cáo thành công!', 'success');
}

function toggleReportStatus(id) {
    const report = allReports.find(r => r.id === id);
    if (!report) return;
    const statuses = ['pending', 'processing', 'resolved'];
    const currentIndex = statuses.indexOf(report.status);
    const nextIndex = (currentIndex + 1) % statuses.length;
    report.status = statuses[nextIndex];
    AppData.updateReport(id, { status: report.status });
    allReports = AppData.getReports();
    applyCommunityFilters();
    showNotification(`🔄 Đã cập nhật trạng thái: ${report.status}`, 'info');
}

function deleteReport(id) {
    if (!confirm('Bạn có chắc muốn xóa báo cáo này?')) return;
    allReports = allReports.filter(r => r.id !== id);
    AppData.deleteReport(id);
    applyCommunityFilters();
    showNotification('🗑️ Đã xóa báo cáo', 'warning');
}

function exportCommunityReportsCSV() {
    if (filteredReports.length === 0) { showNotification('⚠️ Không có dữ liệu!', 'warning'); return; }
    const typeMap = { 'flood': 'Ngập lụt', 'landslide': 'Sạt lở', 'storm': 'Bão', 'other': 'Khác' };
    const severityMap = { 'critical': 'Nghiêm trọng', 'high': 'Cao', 'medium': 'Trung bình', 'low': 'Thấp' };
    const statusMap = { 'pending': 'Chờ xử lý', 'processing': 'Đang xử lý', 'resolved': 'Đã giải quyết' };
    
    const headers = ['Tiêu đề', 'Địa điểm', 'Loại', 'Mức độ', 'Trạng thái', 'Người báo cáo', 'Thời gian'];
    const rows = filteredReports.map(r => [r.title, r.location, typeMap[r.type] || r.type, severityMap[r.severity] || r.severity, statusMap[r.status] || r.status, r.reporter || 'N/A', r.createdAt ? new Date(r.createdAt).toLocaleString('vi-VN') : 'N/A']);
    const csv = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bao_cao_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showNotification('✅ Đã xuất CSV!', 'success');
}

if (document.readyState === 'complete') {
    setTimeout(init_admin_community_reports, 300);
} else {
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(init_admin_community_reports, 300);
    });
}

window.init_admin_community_reports = init_admin_community_reports;
window.applyCommunityFilters = applyCommunityFilters;
window.resetCommunityFilters = resetCommunityFilters;
window.showAddReportModal = showAddReportModal;
window.closeAddReportModal = closeAddReportModal;
window.addCommunityReport = addCommunityReport;
window.toggleReportStatus = toggleReportStatus;
window.deleteReport = deleteReport;
window.exportCommunityReportsCSV = exportCommunityReportsCSV;
</script>
